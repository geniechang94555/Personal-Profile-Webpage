</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">Genie Chang</div>
    <div class="nav-links">
      <a href="index.html">回首頁</a>
    </div>
  </nav>

  <section class="project-hero">
    <div class="section-container">
      <h1>CHILLSENSE 顧客願付價預測</h1>
      <p class="project-subtitle">
        運用機器學習模型優化定價決策，提升商業價值
      </p>
    </div>
  </section>

  <section class="project-content">
    <div class="section-container">
      <div class="project-section">
        <h2>數據分析基礎</h2>
        <p>
          分析 506 筆旅客大數據，透過 Python 進行特徵工程，識別出「地點」與「寧靜度」為影響願付價格的核心關鍵特徵。
        </p>
      </div>
      <div class="project-section">
        <h2>技術應用</h2>
        <ul>
          <li><strong>K-means 分群：</strong> 依據數據特徵細分客群，設計差異化的定價策略以精準觸及目標市場。</li>
          <li><strong>隨機森林模型：</strong> 建立 Random Forest 預測模型，將分析結果轉化為具體的定價建議。</li>
        </ul>
      </div>
      <div class="project-section">
        <h2>關鍵成就</h2>
        <p>
          經過模型持續迭代優化，成功將預測誤差 (RMSE) 大幅縮減 24%，為房源定價提供了極具科學根據的決策輔助。
        </p>
      </div>
    </div>
  </section>

</body>
