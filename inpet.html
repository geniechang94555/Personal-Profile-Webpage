  <section class="project-hero">
    <div class="section-container">
      <h1>INPet 一站式寵物平台</h1>
      <p class="project-subtitle">
        榮獲 2025 國立臺北大學 創新創業提案競賽 第三名 💗
      </p>
    </div>
  </section>

  <section class="project-content">
    <div class="section-container">
      <div class="project-section">
        <h2>專案概述</h2>
        <p>
          與團隊共同開發「INPet」一站式寵物平台，整合寵物社群、電子商務與健康管理。展現產品從 0 到 1 的商業轉化潛力。
        </p>
      </div>
      <div class="project-section">
        <h2>核心貢獻 (CFO 職責)</h2>
        <ul>
          <li><strong>市場分析：</strong> 深入分析用戶需求，並進行 STP 分群與市場定位，確立產品競爭優勢。</li>
          <li><strong>財務建模：</strong> 規劃總額 580 萬之專案預算，並建立完整的商業財務模型與成本結構。</li>
        </ul>
      </div>
      <div class="project-section">
        <h2>獲獎成效</h2>
        <p>
          透過嚴謹的財務估算得出回本期為 2.59 年，成功驗證商業模式的可行性，並最終奪得全校第三名殊榮。
        </p>
      </div>
    </div>
